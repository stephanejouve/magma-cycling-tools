name: lint-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      # Deploy key SSH read-only pour cloner outillages (repo privé), dep
      # déclarée dans pyproject.toml.
      #
      # Pattern base64 (workaround multilignes GHA secret) : après les
      # 2 fails consécutifs côté magma-cycling docker-publish runs v3.34.0
      # + v3.34.1 avec `Load key: error in libcrypto`, le constat est que
      # GHA expose mal une privkey OpenSSH multilignes via
      # `${{ secrets.X }}` — un étage de la chaîne storage→runtime introduit
      # du mangling, même avec env: + printf '%s\n' + tr -d '\r'. Workaround
      # robuste : Admin re-poste la privkey en base64 single-line sous un
      # nouveau secret `OUTILLAGES_DEPLOY_KEY_B64`, et le workflow décode
      # au moment d'écrire. Cf. msg admin id≈2243 (déploiement nocturne
      # 2026-05-09) + magma-cycling PR #335 (fix analogue).
      #
      # Note : ce workflow `lint-and-test.yml` était jusqu'à v0.3.0 sur
      # l'ancien secret `OUTILLAGES_DEPLOY_KEY` (multilignes). Tant que
      # personne ne push de PR sur magma-cycling-tools, le workflow ne
      # tournait pas → bug latent. Mais la pubkey associée à l'ancien
      # secret a été révoquée par Admin (id 150997744 deleted), donc dès
      # le prochain push CI échouait au `poetry install`. Cette PR
      # bascule proactivement sur le nouveau secret base64.
      #
      # Garde-fou sécu : mktemp -d 700 + install -m 600 (atomic, pas de
      # race window vs chmod après).
      - name: Setup outillages SSH deploy key
        id: deploy_key
        env:
          OUTILLAGES_DEPLOY_KEY_B64: ${{ secrets.OUTILLAGES_DEPLOY_KEY_B64 }}
        run: |
          KEY_DIR="$(mktemp -d)"
          KEY_PATH="$KEY_DIR/outillages-deploy-key"
          install -m 600 /dev/null "$KEY_PATH"
          printf '%s' "$OUTILLAGES_DEPLOY_KEY_B64" | base64 -d > "$KEY_PATH"
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"
          echo "key_dir=$KEY_DIR" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        env:
          GIT_SSH_COMMAND: "ssh -i ${{ steps.deploy_key.outputs.key_path }} -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes"
          # Force Poetry à utiliser le client `git` système (qui respecte
          # GIT_SSH_COMMAND) plutôt que dulwich (lib Python bundled, qui
          # ignore GIT_SSH_COMMAND et fail avec HangupException sur deps
          # SSH privées). En Poetry 2.x la var est `POETRY_SYSTEM_GIT_CLIENT`
          # (sans `EXPERIMENTAL_`, renommé depuis 1.2). Cf. python-poetry.org
          # /docs/configuration/#system-git-client.
          POETRY_SYSTEM_GIT_CLIENT: "true"
          # Fallback pour Poetry 1.x si jamais le runner downgrade (le nom
          # legacy est encore reconnu par Poetry 2.x → safe à laisser).
          POETRY_EXPERIMENTAL_SYSTEM_GIT_CLIENT: "true"
        run: poetry install --no-interaction

      # Cleanup defensive (admin advice msg id=2216 point 4) — GHA runner
      # éphémère mais shred explicite limite la fenêtre de leak.
      - name: Cleanup outillages deploy key
        if: always()
        run: |
          if [ -n "${{ steps.deploy_key.outputs.key_path }}" ]; then
            shred -u "${{ steps.deploy_key.outputs.key_path }}" 2>/dev/null || true
            rm -rf "${{ steps.deploy_key.outputs.key_dir }}" 2>/dev/null || true
          fi

      - name: Run pre-commit hooks
        run: poetry run pre-commit run --all-files

      - name: Run tests
        run: poetry run pytest
